name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 22.x
          - 24.x

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check JavaScript syntax
        run: >-
          node --input-type=module -e 'import { readdirSync } from "node:fs";
          import { join } from "node:path";
          import { spawnSync } from "node:child_process";
          for (const name of readdirSync("src")) {
            if (!name.endsWith(".js")) continue;
            const result = spawnSync(process.execPath, ["--check", join("src", name)], { stdio: "inherit" });
            if (result.status !== 0) process.exit(result.status ?? 1);
          }'

      - name: Run checks
        run: |
          npm run check
          npm run check:release

      - name: Validate POSIX bootstrap syntax
        if: runner.os != 'Windows'
        run: sh -n install.sh uninstall.sh

      - name: Validate Windows PowerShell bootstrap syntax
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $failed = $false
          foreach ($file in @('install.ps1', 'uninstall.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref] $tokens,
              [ref] $errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              $errors | ForEach-Object { Write-Error "${file}: $($_.Message)" }
            }
          }
          if ($failed) { exit 1 }

      - name: Run tests
        run: npm test
